; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico         ; exact board definition for your RP2040-Zero
framework = arduino
board_build.core = earlephilhower      ; this is the core you were already using

; Recommended settings for your CCT LED dimmer firmware
monitor_speed = 115200
build_flags =
    -D CORE_DEBUG_LEVEL=1              ; change to 0 for no debug, 2-4 for more Serial output
    ; -D PIO_FRAMEWORK_ARDUINO_ENABLE_WIRE=1   ; uncomment only if you use I2C

; Keep your existing Arduino libraries for now (you can clean this up later)
lib_extra_dirs = ~/Documents/Arduino/libraries
