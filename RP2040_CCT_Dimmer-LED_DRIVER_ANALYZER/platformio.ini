; PlatformIO Project Configuration File — LED Driver Analyzer
; Standalone calibration sketch for finding min_duty
;
; Open THIS FOLDER as the workspace root in VS Code to build/upload.

[platformio]
src_dir = .

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower

monitor_speed = 115200

; All source files (.ino + .cpp) live in the same directory as this ini
; Compile C/C++ sources from project root.
build_src_filter =
	+<*.c>
	+<*.cpp>
	+<*.S>

lib_extra_dirs = ~/Documents/Arduino/libraries
